<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍔 Gemma Burger - Simulation Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js"></script>
    <style>
      /* 기존 스타일 유지 및 확장 */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f2f2f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .phone-container {
        width: 100%;
        max-width: 400px;
        height: 90vh; /* 높이 약간 조절 */
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .header {
        background: #fff;
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #eee;
        font-weight: bold;
        font-size: 1.1em;
        color: #333;
      }
      /* 모드 선택 영역 */
      .mode-area {
        padding: 10px;
        background: #f8f8f8;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: center;
      }
      .sara-btn {
        background-color: #ff2d55;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 15px;
        font-size: 0.85em;
        font-weight: bold;
        cursor: pointer;
      }
      .chat-window {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      /* 페르소나별 말풍선 스타일 */
      .message {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 18px;
        line-height: 1.4;
        font-size: 0.9em;
        position: relative;
        word-wrap: break-word;
      }
      .user {
        align-self: flex-end;
        background-color: #007aff;
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .rosy {
        align-self: flex-start;
        background-color: #e1f5fe;
        color: #01579b;
        border-bottom-left-radius: 4px;
        border: 1px solid #b3e5fc;
      }
      .sara {
        align-self: flex-start;
        background-color: #fff1f1;
        color: #d32f2f;
        border-bottom-left-radius: 4px;
        border: 1px solid #ffcdd2;
        margin-right: 20%;
      }
      .gordon {
        align-self: flex-start;
        background-color: #3a3a3c;
        color: #ffffff;
        border-bottom-left-radius: 4px;
        font-weight: 500;
      }

      .system-msg {
        text-align: center;
        font-size: 0.8em;
        color: #8e8e93;
        margin: 10px 0;
      }

      .input-area {
        padding: 15px;
        background: #fff;
        border-top: 1px solid #eee;
        display: flex;
        gap: 8px;
      }
      input {
        flex: 1;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 20px;
        outline: none;
      }
      button#sendBtn {
        background-color: #007aff;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="header">🍔 Gemma Burger Concierge</div>

      <div class="mode-area">
        <button class="sara-btn" onclick="startSimulation()" id="simBtn">
          ✨ Start Sara Mode (Simulation)
        </button>
      </div>

      <div class="chat-window" id="chatWindow">
        <div class="message rosy">
          Rosy: Hello! I'm Rosy, your burger concierge. What can I get for you
          today?
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Type your order..."
          onkeypress="handleEnter(event)"
        />
        <button onclick="sendMessage()" id="sendBtn">Send</button>
      </div>
    </div>

    <script>
      const sessionId = uuid.v4();
      let currentMessageDiv = null;
      let lastSpeaker = '';

      // 🟢 무한 시뮬레이션 루프 시작 함수
      async function startSimulation() {
        const simBtn = document.getElementById('simBtn');
        const sendBtn = document.getElementById('sendBtn');
        const inputField = document.getElementById('userInput');

        simBtn.disabled = true;
        sendBtn.disabled = true;
        inputField.disabled = true;

        addSystemMessage('Sara has entered the shop...');

        try {
          // NestJS의 /chat/simulate 엔드포인트 호출
          const response = await fetch('/chat/simulate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: sessionId }),
          });

          if (!response.ok) throw new Error('Simulation failed');
          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            parseAndRenderChunk(chunk);
          }
        } catch (error) {
          addSystemMessage('Error during simulation: ' + error.message);
        } finally {
          simBtn.disabled = false;
          sendBtn.disabled = false;
          inputField.disabled = false;
          addSystemMessage('Simulation finished.');
        }
      }

      // 🟢 스트림 데이터를 파싱하여 적절한 페르소나 말풍선에 배치
      function parseAndRenderChunk(chunk) {
        const chatWindow = document.getElementById('chatWindow');

        // 태그 감지 및 새로운 말풍선 생성
        if (chunk.includes('[SARA]:')) {
          currentMessageDiv = createMessageDiv('sara');
          lastSpeaker = 'sara';
        } else if (chunk.includes('[ROSY]:')) {
          currentMessageDiv = createMessageDiv('rosy');
          lastSpeaker = 'rosy';
        } else if (chunk.includes('[GORDON]:')) {
          currentMessageDiv = createMessageDiv('gordon');
          lastSpeaker = 'gordon';
        }

        // 태그를 제외한 실제 텍스트 내용 추가
        const cleanText = chunk
          .replace(
            /\[SARA\]:|\[ROSY\]:|\[GORDON\]:|--- Simulation Ended ---/g,
            '',
          )
          .trim();
        if (cleanText && currentMessageDiv) {
          currentMessageDiv.innerText += cleanText;
          chatWindow.scrollTop = chatWindow.scrollHeight;
        }
      }

      function createMessageDiv(type) {
        const chatWindow = document.getElementById('chatWindow');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        // 이름 접두사 추가
        const name = type.charAt(0).toUpperCase() + type.slice(1);
        div.innerText = `${name}: `;
        chatWindow.appendChild(div);
        return div;
      }

      function addSystemMessage(text) {
        const chatWindow = document.getElementById('chatWindow');
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.innerText = `— ${text} —`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      // 기존 1:1 채팅 함수 (유지)
      async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const text = inputField.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        inputField.value = '';
        const aiMessageDiv = createMessageDiv('rosy');

        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId: sessionId }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          aiMessageDiv.innerText += decoder.decode(value, { stream: true });
        }
      }

      function addMessage(text, sender) {
        const chatWindow = document.getElementById('chatWindow');
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
      }
    </script>
  </body>
</html>
