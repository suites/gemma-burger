<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍔 Gemma Burger - Simulation Mode</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js"></script>
  </head>
  <body>
    <div class="phone-container">
      <div class="header">🍔 Gemma Burger Concierge</div>

      <div class="mode-area">
        <button class="sara-btn" onclick="startSimulation()" id="simBtn">
          ✨ Start Sara Mode (Simulation)
        </button>
      </div>

      <div class="chat-window" id="chatWindow">
        <div class="message rosy">
          Rosy: Hello! I'm Rosy, your burger concierge. What can I get for you
          today?
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Type your order..."
          onkeypress="handleEnter(event)"
        />
        <button onclick="sendMessage()" id="sendBtn">Send</button>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
